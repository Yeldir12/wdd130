<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        #main {
            background-image: url('images/christus.webp');
            background-repeat: no-repeat;
            background-position: center;
            margin: 50px auto;
            border: solid black 10px;
            border-radius: 50px;
            width: 1500px;
            height: 1000px;
        }

        h1 {
            text-align: center;
            color: white;
            font-family: Arial;
        }

        h2 {
            text-align: center;
            color: white;
            font-family: Arial;
        }

        #first_presidency {
            display: flex;
            justify-content: center;
        
        }

        #quorum {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        margin-left: 150px;
        }

        #lar {
            border: solid white 10px;
            border-radius: 50%;
            width: 250px;
            height: 250px;
            object-fit: cover;
            object-position: 0px -10px
        }

        #med {
            border: solid white 10px;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin-top: 30px;
            margin:30px 20px 0px 20px;
            object-fit: cover;
            object-position: 0px -10px
        }

        #sma {
            border: solid white 10px;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            object-fit: cover;
            object-position: 0px -10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <div id="main">
        <h1>First Presidency</h1>
        <div id="first_presidency">
            <img id="med" src="images/eyring.webp" alt="Elder Eyring">
            <img id="lar" src="images/oaks.webp" alt="Elder Oaks">
            <img id="med" src="images/christofferson.webp" alt="Elder Christofferson">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div id="quorum">
            <img id="sma" src="images/holland.webp" alt="Elder Holland">
            <img id="sma" src="images/uchtdorf.webp" alt="Elder Uchtdorf">
            <img id="sma" src="images/bednar.webp" alt="Elder Bednar">
            <img id="sma" src="images/cook.webp" alt="Elder Cook">
            <img id="sma" src="images/anderson.webp" alt="Elder Anderson">
            <img id="sma" src="images/rasband.webp" alt="Elder Rasband">
            <img id="sma" src="images/stevenson.webp" alt="Elder Stevenson">
            <img id="sma" src="images/renlund.webp" alt="Elder Renlund">
            <img id="sma" src="images/gong.webp" alt="Elder Gong">
            <img id="sma" src="images/soares.webp" alt="Elder Soares">
            <img id="sma" src="images/kearon.webp" alt="Elder Kearon">
            <img id="sma" src="images/causse.webp" alt="Elder Causse">
        </div>
    </div>
</body>
</html>
