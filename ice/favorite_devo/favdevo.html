<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table class="blueTable">
            <thead>
              <tr>
                <th>Speaker</th>
                <th>Title</th>
                <th>Location</th>
                <th>Year</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Elder Holland</td>
                <td>For Times Of Trouble</td>
                <td>BYU</td>
                <td>1980</td>
              </tr>
              <tr>
                <td>Perry Rockwood</td>
                <td>When Sorrow Meets the Savior</td>
                <td>BYU-I</td>
                <td>2025</td>
              </tr>
              <tr>
                <td>Elder Cook</td>
                <td>His Paths Are Righteous</td>
                <td>BYU-I</td>
                <td>2025</td>
              </tr>
            </tbody>
          </table>
           <form>
              <label for="speak">Speaker:</label><br>
              <input type="text" id="speak" name="speak"><br>

              <label for="title">Title:</label><br>
              <input type="text" id="title" name="title"><br>

              <label for="loc">Location:</label><br>
              <input type="text" id="loc" name="loc"><br>

              <label for="year">Year:</label><br>
              <input type="text" id="year" name="year">
            </form>
      </div>
    </main>
  </div>
</body>
</html>
