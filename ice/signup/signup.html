<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }
        body {
            background: rgb(120, 96, 64);
        }
        #formContainer {
            border: 10px solid darkblue;
            border-radius: 25px;
            height: 600px;
            width: 400px;
            margin: 50px auto;
        }
        #header {
            height: 175px;
            width: auto;
            background-image: url(images/jesus_feeds_5000.jpeg);
            background-size: 100%;
            border-radius: 10px;
        }
        #closeBtn {
            margin-top: 15px;
            margin-left: 15px;
            padding: 2px 5px;
        }
        #jesusfeed {
            width: 100%;
            border-radius: 18px;
        }
        h1, h2 {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 1px black;
        }
        h1 {
            padding-top: 35px;
            font-size: 40px;
        }
        h2 {
            font-size: 30px;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            height: 150px;
            width: 380px;
            background-color: white;
            padding-left: 20px;
        }
        h3 {
            text-align: center;
            padding-top: 20px;
            padding-bottom: 20px;
            background-color: white;
        }
        #username, #password, #email {
            margin: 0px 10px 20px 0px;
        }
        #check {
            display: grid;
            justify-content: center;
            justify-items: center;
            align-items: center;
            background-color: white;
            height: 115px;
        }
        footer {
            display: flex;
            justify-content: center;
            gap: 5px;
            background-color: white;
            border-radius: 0px 0px 18px 18px;
        }
        .scriptures {
            width: 75px;
            height: 100px;
        }
    </style>





</head>

<body>
    <div id="formContainer">
        <div id="header">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>
        </form>
        <div id="check">
         <section id="newsletter">
                <input type="checkbox"  name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section id="conditions">
                <input type="checkbox"  name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section id="submit">
                <button type="submit">Submit</button>
            </section>
         </div>
        <footer>
            <img class="scriptures" src="images/old_testament.webp">
            <img class="scriptures" src="images/new_testament.webp">
            <img class="scriptures" src="images/book_of_mormon.webp">
            <img class="scriptures" src="images/doctrine_and_covenants.webp">
            <img class="scriptures" src="images/pearl_of_great_price.webp">
        </footer>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
